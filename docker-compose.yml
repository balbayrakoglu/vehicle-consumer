services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"

  vehicle-consumer:
    build: .
    depends_on:
      - rabbitmq
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      APP_RABBIT_QUEUE: vehicle_queue
      APP_RABBIT_DECLARE_TOPOLOGY: "false"
    ports:
      - "8080:8080"
